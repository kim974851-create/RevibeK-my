spring.application.name=RevibeK
spring.profiles.include=secret
# dataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/kpop_radio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=SSAFY
spring.datasource.password=SSAFY
# mybatis
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.ssafy.revibek
mybatis.configuration.map-underscore-to-camel-case=true
# security
spring.security.user.name=admin
spring.security.user.password=1234
# jwt

jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000
# oauth2 google

spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}
# smtp mail (email verification)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# gms claude
gms.api.base-url=${GMS_API_BASE_URL:https://gms.ssafy.io/gmsapi/api.anthropic.com/v1/messages}
gms.api.key=${GMS_KEY:}
gms.api.anthropic-version=2023-06-01
gms.api.model=claude-3-7-sonnet-latest
gms.api.max-tokens=300
gms.api.budget-credit=30
gms.api.input-cost-per-1k=0.03
gms.api.output-cost-per-1k=0.15

# google cloud text-to-speech (rest api)
gcp.tts.base-url=${GCP_TTS_BASE_URL:https://texttospeech.googleapis.com/v1}
gcp.tts.api-key=${GCP_TTS_API_KEY:}
gcp.tts.default-language-code=ko-KR
gcp.tts.default-voice-name=
gcp.tts.default-audio-encoding=MP3
gcp.tts.default-speaking-rate=1.0
gcp.tts.default-pitch=0.0

